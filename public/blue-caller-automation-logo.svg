<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phoneGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C7DFF"/>
      <stop offset="100%" stop-color="#0D2D6A"/>
    </linearGradient>
    <linearGradient id="hatGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67B6FF"/>
      <stop offset="100%" stop-color="#1F63E0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#08224F" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full lockup -->
  <g transform="translate(42 78)" filter="url(#softShadow)">
    <!-- Phone body -->
    <rect x="0" y="56" width="176" height="286" rx="40" fill="url(#phoneGradient)"/>
    <rect x="18" y="76" width="140" height="245" rx="27" fill="#F1F7FF"/>
    <rect x="66" y="63" width="44" height="6" rx="3" fill="#9BC4FF"/>
    <circle cx="88" cy="308" r="10" fill="#8DB9FF"/>

    <!-- Hard hat -->
    <path d="M26 90C26 48 60 14 99 14C138 14 170 46 170 86V98H26V90Z" fill="url(#hatGradient)"/>
    <rect x="18" y="90" width="162" height="20" rx="10" fill="#1B58CD"/>
    <path d="M96 26C109 31 116 41 116 57V90H84V57C84 41 90 31 96 26Z" fill="#89CAFF" fill-opacity="0.75"/>

    <!-- Signal waves -->
    <path d="M194 132C220 147 220 252 194 266" stroke="#57A3FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M219 108C258 131 258 287 219 309" stroke="#8FC4FF" stroke-width="10" stroke-linecap="round"/>

    <!-- Wordmark -->
    <text x="236" y="166" fill="#0C2D6B" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="800" letter-spacing="1">BLUE CALLER</text>
    <text x="236" y="241" fill="#2C7DFF" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="2">AUTOMATION</text>
    <text x="239" y="286" fill="#4B6FAE" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="600" letter-spacing="1">AI PHONE RECEPTION FOR TRADES</text>
  </g>

  <!-- Icon-only mark -->
  <g transform="translate(1100 75)" filter="url(#softShadow)">
    <circle cx="150" cy="182" r="150" fill="#EAF3FF"/>
    <rect x="84" y="115" width="134" height="213" rx="32" fill="url(#phoneGradient)"/>
    <rect x="99" y="131" width="104" height="179" rx="20" fill="#F5F9FF"/>
    <rect x="129" y="121" width="45" height="5" rx="2.5" fill="#9BC4FF"/>
    <circle cx="151" cy="300" r="8" fill="#8DB9FF"/>

    <path d="M104 140C104 107 130 80 161 80C191 80 215 106 215 137V146H104V140Z" fill="url(#hatGradient)"/>
    <rect x="97" y="141" width="126" height="14" rx="7" fill="#1B58CD"/>
    <path d="M157 89C167 93 173 102 173 115V141H145V115C145 102 151 93 157 89Z" fill="#89CAFF" fill-opacity="0.72"/>
  </g>
</svg>
